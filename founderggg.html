<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dr. Ahmed Kaffel | Founder & Director | ITECCS</title>

<meta name="description" content="Dr. Ahmed Kaffel is Founder and Director of ITECCS, advancing applied mathematics, artificial intelligence, scientific computing, and engineering innovation through research, consulting, and education.">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* ===========================
   ELITE DESIGN SYSTEM
=========================== */

:root{
--navy-950:#020617;
--navy-900:#051124;
--navy-800:#0a1f3d;
--gold:#FDB515;
--gold-soft:rgba(253,181,21,.15);
--text-dark:#0f172a;
--text-med:#334155;
--text-light:#64748b;
--bg:#f4f7fb;
}

/* GLOBAL */
body{
font-family:"Inter",system-ui;
background:var(--bg);
margin:0;
color:var(--text-dark);
-webkit-font-smoothing:antialiased;
}

/* NAVBAR */
.navbar{
background:linear-gradient(135deg,var(--navy-950),var(--navy-800));
padding:18px 40px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 6px 24px rgba(0,0,0,.4);
}

.logo img{ height:44px; }

.nav-links{
display:flex;
gap:28px;
list-style:none;
margin:0;
padding:0;
}

.nav-links a{
color:white;
text-decoration:none;
font-weight:600;
opacity:.9;
}

.nav-links a:hover{ color:var(--gold); }

.contact-nav-button{
background:linear-gradient(135deg,#FFD54F,#FDB515);
padding:10px 18px;
border-radius:8px;
color:#1a1a1a !important;
font-weight:700;
}

/* MAIN WRAPPER */
.content{
max-width:1300px;
margin:auto;
padding:60px 20px 100px;
}

/* HERO */
.founder-hero{
display:grid;
grid-template-columns:1.3fr 0.7fr;
padding:65px;
border-radius:26px;
background:
radial-gradient(circle at 10% 10%,rgba(253,181,21,.2),transparent 60%),
linear-gradient(135deg,var(--navy-900),var(--navy-800));
box-shadow:0 60px 140px rgba(0,0,0,.45);
color:white;
align-items:center;
}

.founder-hero__title{
font-size:3rem;
font-weight:900;
}

.founder-hero__subtitle{
margin-top:10px;
font-weight:600;
opacity:.95;
}

.founder-hero__tagline{
margin-top:18px;
line-height:1.7;
font-size:1.05rem;
}

/* BUTTONS */
.btn{
display:inline-block;
margin-top:22px;
margin-right:10px;
padding:12px 26px;
border-radius:999px;
font-weight:700;
text-decoration:none;
transition:.25s;
}

.btn-primary{
background:linear-gradient(135deg,#FFD54F,#FDB515);
color:#1a1a1a;
}

.btn-primary:hover{ transform:translateY(-2px); }

.btn-outline{
border:1.5px solid rgba(255,255,255,.7);
color:white;
}

.btn-text{
border:1.5px solid rgba(255,255,255,.7);
color:white;
}

/* PHOTO */
.founder-hero__photo{
width:220px;
height:220px;
border-radius:50%;
border:4px solid white;
box-shadow:0 45px 110px rgba(0,0,0,.6);
object-fit:cover;
}

/* STATS */
.founder-stats__grid{
margin-top:50px;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
}

.founder-stats__item{
background:white;
padding:22px;
border-radius:16px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,.08);
}

.founder-stats__number{
font-size:1.7rem;
font-weight:900;
color:#1d4ed8;
}

/* SECTIONS */
.elite-card,
.founder-quote,
.founder-message,
.founder-bio,
.founder-cta,
.bottom-cta{
margin-top:60px;
background:white;
padding:40px;
border-radius:18px;
box-shadow:0 20px 60px rgba(0,0,0,.06);
}

/* FOOTER */
footer{
background:linear-gradient(135deg,var(--navy-950),var(--navy-800));
color:white;
padding:40px;
text-align:center;
margin-top:70px;
}

/* RESPONSIVE */
@media(max-width:900px){
.founder-hero{
grid-template-columns:1fr;
text-align:center;
}
.founder-stats__grid{
grid-template-columns:1fr 1fr;
}
}
</style>

</head>

<body>
