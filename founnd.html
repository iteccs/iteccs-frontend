<!-- founder.html (Elite High-Contrast Ultimate Version) -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Dr. Kaffel | Founder & Director of ITECCS | Applied Mathematics, AI, Scientific Computing</title>

<meta name="description" content="Dr. Ahmed Kaffel is the Founder & Director of ITECCS, advancing applied mathematics, AI, scientific computing and engineering innovation.">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ===============================
   ELITE REFINED DESIGN SYSTEM
================================ */

:root{
--navy-950:#020617;
--navy-900:#07101f;
--navy-800:#0b2a5b;
--gold:#FDB515;
--gold-soft:rgba(253,181,21,.15);
--text-dark:#0f172a;
--muted:#334155;
--bg:#f4f7fb;
}
<script>
document.addEventListener("DOMContentLoaded", function () {

const counters = document.querySelectorAll('.founder-stats__number');

const animateCounter = (counter) => {
  const target = +counter.innerText.replace('+','');
  let count = 0;
  const speed = 30;
  const increment = target / 60;

  const updateCount = () => {
    if(count < target){
      count += increment;
      counter.innerText = Math.floor(count) + "+";
      requestAnimationFrame(updateCount);
    } else {
      counter.innerText = target + "+";
    }
  };
  updateCount();
};

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      animateCounter(entry.target);
      observer.unobserve(entry.target);
    }
  });
},{threshold:0.6});

counters.forEach(counter => {
  observer.observe(counter);
});

});
</script>
body{
margin:0;
font-family:"Inter",system-ui;
background:linear-gradient(180deg,#f7f9fe 0%,#eef2f8 100%);
color:var(--text-dark);
line-height:1.75;
-webkit-font-smoothing:antialiased;
}

/* NAVBAR */
.navbar{
position:sticky;
top:0;
z-index:100;
background:linear-gradient(135deg,var(--navy-950),var(--navy-800));
padding:18px 40px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 6px 24px rgba(0,0,0,.45);
}
.logo img{height:44px;}
.nav-links{
display:flex;
gap:26px;
list-style:none;
margin:0;
padding:0;
}
.nav-links a{
color:#ffffff;
text-decoration:none;
font-weight:600;
opacity:.92;
transition:.25s;
}
.nav-links a:hover{color:var(--gold);}
.contact-nav-button{
background:linear-gradient(135deg,#FFD54F,#FDB515);
padding:10px 18px;
border-radius:999px;
color:#1a1a1a!important;
font-weight:800;
}

/* MAIN */
.content{
max-width:1200px;
margin:auto;
padding:40px 20px 100px;
}

/* HERO */
.founder-hero{
position:relative;
display:grid;
grid-template-columns:1.6fr 1fr;
gap:30px;
padding:55px;
border-radius:26px;
background:linear-gradient(135deg,var(--navy-900),var(--navy-800));
box-shadow:0 60px 140px rgba(0,0,0,.45);
color:#ffffff;
overflow:hidden;
}

/* soft overlay */
.founder-hero::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(90deg,rgba(0,0,0,.35),rgba(0,0,0,.05));
z-index:1;
}

/* content above overlay */
.founder-hero__content{
position:relative;
z-index:2;
}

/* readability panel */
.founder-hero__content > div:first-child{
background:linear-gradient(90deg,rgba(2,6,23,.88),rgba(2,6,23,.45));
padding:28px;
border-radius:18px;
box-shadow:0 25px 60px rgba(0,0,0,.45);
}

/* title */
.founder-hero__title{
font-size:3rem;
font-weight:900;
letter-spacing:-0.02em;
margin:10px 0;
color:#ffffff;
text-shadow:0 4px 20px rgba(0,0,0,.9);
}

/* gold accent line */
.founder-hero__title::after{
content:"";
display:block;
width:70px;
height:4px;
margin-top:12px;
border-radius:999px;
background:linear-gradient(90deg,var(--gold),rgba(255,255,255,.2));
}

/* subtitle */
.founder-hero__subtitle{
font-weight:700;
margin-top:15px;
color:#ffffff;
}

/* description */
.founder-hero__tagline{
margin-top:18px;
font-size:1.05rem;
color:rgba(255,255,255,.97);
}

/* buttons */
.btn{
display:inline-block;
margin-top:24px;
margin-right:12px;
padding:12px 28px;
border-radius:999px;
font-weight:700;
text-decoration:none;
transition:.3s;
}
.btn-primary{
background:linear-gradient(135deg,#FFD54F,#FDB515);
color:#1a1a1a;
}
.btn-primary:hover{transform:translateY(-2px);}
.btn-outline{
border:1.5px solid #ffffff;
color:#ffffff;
}
.btn-text{
border:1.5px solid rgba(255,255,255,.7);
color:#ffffff;
}

/* photo */
.founder-hero__photo{
width:210px;
height:210px;
border-radius:50%;
border:4px solid white;
object-fit:cover;
box-shadow:0 40px 120px rgba(0,0,0,.6);
}

/* STATS */
.founder-stats__grid{
margin-top:60px;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:18px;
}
.founder-stats__item{
background:#ffffff;
padding:24px;
border-radius:18px;
text-align:center;
box-shadow:0 20px 60px rgba(0,0,0,.08);
}
.founder-stats__number{
font-size:2rem;
font-weight:900;
color:var(--gold);
}

/* SECTIONS */
.elite-card,
.founder-quote,
.founder-message,
.founder-bio,
.founder-cta,
.bottom-cta{
margin-top:60px;
background:#ffffff;
padding:40px;
border-radius:20px;
box-shadow:0 25px 70px rgba(0,0,0,.06);
}

/* FOOTER */
footer{
background:linear-gradient(135deg,var(--navy-950),var(--navy-800));
color:white;
padding:40px;
text-align:center;
margin-top:80px;
}

/* RESPONSIVE */
@media(max-width:900px){
.founder-hero{grid-template-columns:1fr;text-align:center;}
.founder-stats__grid{grid-template-columns:1fr 1fr;}
}

</style>
</head>
