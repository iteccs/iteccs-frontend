<form action="https://formspree.io/f/meelrnog" method="POST">

<input name="name" required placeholder="Full name">

<input name="organization" required placeholder="University / Company">

<input name="email" required type="email" placeholder="Professional email">

<select name="interest">
<option>Research collaboration</option>
<option>Consulting project</option>
<option>Training program</option>
<option>Industry partnership</option>
<option>Government collaboration</option>
</select>

<textarea name="message" required placeholder="Describe your collaboration interest"></textarea>

<button type="submit">
Request Collaboration
</button>

</form>
