  <main class="content payment-page">
    <h1>Secure Payment</h1>
    <p class="subtitle">Choose your preferred method to pay for ITeec's consulting services.</p>

    <div class="payment-wrapper">
      <!-- PayPal -->
      <div class="payment-box paypal-box">
        <h2>Pay with PayPal</h2>
        <form action="https://www.paypal.com/cgi-bin/webscr" method="post" target="_blank">
          <input type="hidden" name="cmd" value="_xclick" />
          <input type="hidden" name="business" value="kaffel07@gmail.com" />
          <input type="hidden" name="item_name" value="ITeecs Consulting Services" />
          <input type="hidden" name="currency_code" value="USD" />
          <input type="number" name="amount" placeholder="Amount (USD)" required />
          <input type="text" name="first_name" placeholder="First Name" required />
          <input type="text" name="last_name" placeholder="Last Name" required />
          <input type="email" name="email" placeholder="Email" required />
          <button type="submit" class="btn-paypal">Pay with PayPal</button>
        </form>
      </div>

      <!-- Stripe -->
      <div class="payment-box stripe-box">
        <h2>Pay with Card</h2>
        <p class="stripe-text">Use your credit or debit card to make a secure payment powered by Stripe.</p>
        <form action="https://buy.stripe.com/test_8x228t0yjer61rjcC1cIE00" method="GET" target="_blank">
          <button type="submit" class="btn-stripe">Pay with Stripe</button>
        </form>
      </div>
    </div>
  </main>
