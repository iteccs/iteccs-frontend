  <script type="text/javascript">
    var Tawk_API = Tawk_API || {};
    var Tawk_LoadStart = new Date();

    (function(){
      var s1=document.createElement("script"),
          s0=document.getElementsByTagName("script")[0];
      s1.async=true;
      s1.src='https://embed.tawk.to/685e2123390063190e54b4b2/1iunr2sv2';

      s1.setAttribute('crossorigin','*');
      s0.parentNode.insertBefore(s1,s0);
    })();

    // Hide default widget once fully loaded
    Tawk_API.onLoad = function(){
      Tawk_API.hideWidget();
    };

    // Custom button opens chat
    document.addEventListener("DOMContentLoaded", function(){
      var btn = document.getElementById("custom-chat-btn");
      if(btn){
        btn.addEventListener("click", function(){
          if(typeof Tawk_API !== "undefined"){
            Tawk_API.maximize(); // open chat window
          }
        });
      }
    });
  </script>
