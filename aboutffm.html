<style>

/* ================= HERO ================= */

.about-hero{
  padding:140px 20px 120px 20px;
  text-align:center;
  background:
    radial-gradient(circle at 50% 20%, rgba(59,130,246,0.15), transparent 60%),
    linear-gradient(135deg,#020617 0%, #020617 30%, #0f172a 60%, #1e3a8a 100%);
  color:white;
  position:relative;
}

.about-hero::after{
  content:"";
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  height:1px;
  background:linear-gradient(to right, transparent, rgba(255,255,255,0.2), transparent);
}

.about-hero h1{
  font-size:3.2rem;
  font-weight:800;
  margin-bottom:28px;
  letter-spacing:-0.6px;
  line-height:1.2;
}

.about-hero p{
  max-width:950px;
  margin:auto;
  line-height:2;
  font-size:1.18rem;
  opacity:0.95;
}

/* ================= DIRECTOR SECTION ================= */

.about-section{
  padding:90px 20px;
  background:#f8fafc;
  text-align:center;
}

.about-section h2{
  font-size:2.3rem;
  font-weight:800;
  color:#020617;
  margin-bottom:28px;
}

.about-section p{
  max-width:900px;
  margin:auto;
  color:#334155;
  line-height:2;
  font-size:1.12rem;
}

/* ================= CARD GRID ================= */

.card-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:40px;
  max-width:1300px;
  margin:70px auto;
}

.card{
  background:white;
  padding:45px 35px;
  border-radius:22px;
  border:1px solid rgba(15,23,42,0.06);
  box-shadow:
    0 20px 50px rgba(2,6,23,0.06),
    0 6px 20px rgba(2,6,23,0.04);
  transition:all 0.35s ease;
  text-align:left;
  position:relative;
}

.card::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:4px;
  background:linear-gradient(to right,#1e3a8a,#3b82f6,#1e40af);
  border-radius:22px 22px 0 0;
}

.card:hover{
  transform:translateY(-12px);
  box-shadow:
    0 35px 80px rgba(2,6,23,0.12),
    0 15px 40px rgba(2,6,23,0.08);
}

.card i{
  font-size:30px;
  color:#1e3a8a;
  margin-bottom:18px;
}

.card h3{
  font-size:1.35rem;
  font-weight:700;
  margin-bottom:16px;
  color:#020617;
}

.card ul{
  padding-left:18px;
  color:#475569;
  line-height:1.9;
}

.card li{
  margin-bottom:10px;
}

/* ================= SECTION DIVIDER ================= */

.section-divider{
  width:80px;
  height:4px;
  background:#1e3a8a;
  margin:20px auto 40px auto;
  border-radius:2px;
}

/* ================= RESPONSIVE ================= */

@media(max-width:1100px){
  .card-grid{ grid-template-columns:repeat(2,1fr); }
}

@media(max-width:650px){
  .card-grid{ grid-template-columns:1fr; }
  .about-hero h1{ font-size:2.3rem; }
}

</style>
